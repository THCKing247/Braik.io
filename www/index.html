<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Braik</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
        text-align: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      p {
        max-width: 28rem;
        line-height: 1.5;
      }
      code {
        background: #1e293b;
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.85em;
      }
    </style>
  </head>
  <body>
    <div>
      <p><strong>Braik</strong></p>
      <p>
        If you see this in the app, Capacitor is not loading a remote URL yet. Set
        <code>CAPACITOR_SERVER_URL</code> (production) or
        <code>CAPACITOR_DEV_SERVER_URL</code> (local Next server), then run
        <code>npx cap sync</code>.
      </p>
    </div>
  </body>
</html>
